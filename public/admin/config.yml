backend:
  name: github
  repo: neo-era/lavipco1          # Tên repo GitHub: username/repo-name
  branch: main
  auth_type: pkce                  # Xác thực PKCE - không cần server trung gian
  app_id: Ov23liYZ61JWYGI0tlzZ   # ← Thay bằng Client ID từ bước hướng dẫn bên dưới

site_url: https://neo-era.github.io/lavipco1

media_folder: "public/media"
public_folder: "/media"

collections:
  - name: "projects"
    label: "Dự án tiêu biểu"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Tiêu đề", name: "title", widget: "string", required: true}
      - {label: "Giá trị hợp đồng", name: "value", widget: "string"}
      - {label: "Chủ đầu tư", name: "client", widget: "string"}
      - {label: "Năm thi công", name: "year", widget: "string"}
      - {label: "Địa điểm", name: "location", widget: "string"}
      - {label: "Mô tả ngắn", name: "description", widget: "text"}
      - {label: "Hình ảnh đại diện", name: "image", widget: "image", required: false}

  - name: "services"
    label: "Lĩnh vực hoạt động"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Tên lĩnh vực", name: "title", widget: "string", required: true}
      - {label: "Mô tả", name: "description", widget: "text"}

  - name: "team"
    label: "Nhân sự chủ chốt"
    folder: "content/team"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Họ tên", name: "name", widget: "string", required: true}
      - {label: "Chức vụ", name: "position", widget: "string"}
      - {label: "Chuyên môn", name: "specialty", widget: "string"}
      - {label: "Kinh nghiệm", name: "experience", widget: "string"}
      - {label: "Ảnh cá nhân", name: "photo", widget: "image", required: false}

  - name: "certificates"
    label: "Chứng chỉ & Hồ sơ pháp lý"
    folder: "content/certificates"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Tên chứng chỉ", name: "title", widget: "string", required: true}
      - {label: "Số hiệu", name: "number", widget: "string"}
      - {label: "Ngày cấp", name: "date", widget: "string"}
      - {label: "Hình ảnh scan", name: "image", widget: "image", required: false}
