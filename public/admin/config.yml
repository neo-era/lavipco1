backend:
  name: github
  repo: neo-era/lavipco1          # ← Đổi nếu tên repo của em khác
  branch: main

site_url: https://neo-era.github.io/lavipco1   # ← Dòng này rất quan trọng

media_folder: "public/media"
public_folder: "/media"

collections:
  - name: "projects"
    label: "Dự án tiêu biểu"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Tiêu đề", name: "title", widget: "string", required: true}
      - {label: "Giá trị", name: "value", widget: "string"}
      - {label: "Chủ đầu tư", name: "client", widget: "string"}
      - {label: "Năm", name: "year", widget: "string"}
      - {label: "Địa điểm", name: "location", widget: "string"}
      - {label: "Mô tả ngắn", name: "description", widget: "text"}
      - {label: "Hình ảnh", name: "image", widget: "image"}

  - name: "services"
    label: "Lĩnh vực hoạt động"
    folder: "content/services"
    create: true
    fields:
      - {label: "Tên lĩnh vực", name: "title", widget: "string", required: true}
      - {label: "Mô tả", name: "description", widget: "markdown"}

  - name: "team"
    label: "Nhân sự"
    folder: "content/team"
    create: true
    fields:
      - {label: "Họ tên", name: "name", widget: "string", required: true}
      - {label: "Chức vụ", name: "position", widget: "string"}
      - {label: "Chuyên môn", name: "specialty", widget: "string"}
      - {label: "Kinh nghiệm", name: "experience", widget: "string"}
      - {label: "Ảnh cá nhân", name: "photo", widget: "image"}

  - name: "certificates"
    label: "Chứng chỉ & Hồ sơ pháp lý"
    folder: "content/certificates"
    create: true
    fields:
      - {label: "Tên chứng chỉ", name: "title", widget: "string", required: true}
      - {label: "Số hiệu", name: "number", widget: "string"}
      - {label: "Ngày cấp", name: "date", widget: "string"}
      - {label: "Hình ảnh scan", name: "image", widget: "image"}